     <h1>003. 자료형, 자료형확인 (typeof)</h1>
     <ul>
        <li>자료형 </li>
        <li>자료형확인(typeof) </li> 
     </ul>
  </div><!-- end div-->
  <div class="container card my-3">
    <h2 class="card-header">자료형실습</h2>
    <div class="card-body">
        <script>
            ////////////////////////// 여기 실습     
            //Q1. 변수 num1 만들고 숫자 10 넣기
            let num1=10;

            //Q2. 변수 num2 만들고  "3" 넣기
            let num2="3";
            //    let result = num1 + num2;
            
            //Q3. console.log(typeof(num1))  출력되는  자료형은?
            console.log(typeof(num1));
            //number
            
            //Q4. console.log(typeof(num2))  출력되는  자료형은?
            console.log(typeof(num2));
            //String
            
            //Q4. document.write(result);   값이 13 나오게 만들기
            let result = num1 + Number(num2); 
            document.write(result);

            //Q5. document.write(result);   값이 103 나오게 만들기
            let result2 = num1*10 + Number(num2);
            document.write("<br>"+result2);

            let result3 = num1 + num2;
            document.write("<br>"+result3);

            //Q6. 
            let surprise = num1 - num2; // 10(숫자) - "3"(문자)
            console.log(surprise);

            //예상 결과 : 310? 아니고 7. - * / 모두 숫자 문자는 그대로 숫자로 계산  

        </script>
    </div>
  </div>
