<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS ID/CLASS</title>
    <style>
        /* 전체 여백 빼기 */
        * { margin:0; padding: 0; }


        /* body 좋아하는 글꼴 */
        body{
            font-family: 'Courier ', Courier, monospace;
            background: linear-gradient(135geg, #eee, #31428b);
        }

        /* Q1. h3 중앙정렬, 글자색상 : #e1306c,  아래쪽여백 : 10px  */
        h3{
            text-align: center;
            color:brown;
            margin-bottom: 10px; 
        }

        /* Q2. p 중앙정렬, 글자크기 : 14px, 글자색상 : #666, 아래쪽여백 : 20px */
        p{
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        /* Q3. div 배경색상 : #fff, 너비 : 300px, 여백 : 위아래 30px 좌우 중앙정렬, 
        안쪽여백 : 20px, 테두리 둥글게 : 15px, 그림자효과, 왼쪽정렬 */
        div{
            background-color: #c9afaf;
            width: 300px;
            margin: 30px auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
            /* text-shadow: 0 0 10px red, 10px 0 5px rgb(151, 151, 184); */
            text-align: left;

        }

        /* Q4. dt 글자굵기 : 굵게, 아래쪽여백 : 10px, 글자색상 : #333 */
        dt{
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;

        }


        /* Q5. dd 글자크기 : 14px, 글자색상 : #666, 아래쪽여백 : 8px, 
        왼쪽 안쪽여백 : 10px */
        dd{
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            padding-left: 10px;
        }



        /* Q6. id1, id2 글자색상 :  각각 색상다르게 글자굵기 : 굵게 
        id="id1"
        id="id2"
        */
        dd#id1{   color:rgb(70, 17, 17);   }
          #id2{   color:brown;             }


        /* Q7. .mycss 배경색상 : #f9f1f7, 왼쪽 테두리 : 4px 실선 #e1306c, 
        안쪽여백 : 5px 10px, 테두리 둥글게 : 5px 
        class="myclass" two"  */
        .myclass{
            background-color: #31428b;
            border-left: 4px solid #962f2f;
            padding: 5px 10px;
            border-radius: 5px;
        }
        .two{border-color: #439b4a;}


    </style>
</head>
<body>
    <div>
        <h3>id</h3>
        <p> css 안에서 선택자 - 유일한 값 </p>
        <dl>
            <dt>id의 특징</dt>
            <dd>html 문서에서 한번만 사용 가능</dd>
            <dd id="id1"> 중복이 불가 - Error: Duplicate ID id1 </dd>
            <dd id="id2"> css 에서는 #id명 </dd>
            <dd> 우선순위 id와 class 모두 있을 때 id가 더 높음 </dd>
        </dl>
    </div> <!-- end div -->

    <div>
        <h3>class</h3>
        <p> css 안에서 선택자 - 여러개 선택시 </p>
        <dl>
            <dt>class의 특징</dt>
            <dd class="myclass">재사용이 가능: 여러요소에 class 지정가능</dd>
            <dd class="myclass two">하나의 요소에 여러개의 class 사용 가능</dd>
            <dd>css 에서는 .class 명</dd>
            <dd>반복되는 스타일에 적합한 친구가 class</dd>
        </dl>
    </div>
</body>
</html>
