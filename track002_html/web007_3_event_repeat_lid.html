<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ID 이벤트 연습</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 50px; }
        .btn-group { margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>ID를 이용한 이벤트 연결 미션</h2>
        <p class="text-muted">각 버튼을 클릭했을 때 해당 숫자가 알림창으로 뜨게 만드세요.</p>
        <hr>

        <div class="btn-group">
            <input type="button" value="one"   id="one"   class="btn btn-outline-primary" />
            <input type="button" value="two"   id="two"   class="btn btn-outline-primary" />
            <input type="button" value="three" id="three" class="btn btn-outline-primary" />
            <input type="button" value="four"  id="four"  class="btn btn-outline-primary" />
            <input type="button" value="five"  id="five"  class="btn btn-outline-primary" />
        </div>
    </div>

    <script>
        // [예시] 아이디가 one인 버튼을 클릭하면 1을 띄웁니다.
        document.getElementById("one").onclick = function(){
            alert(1);
        };

        // Q. 아이디가 two인 버튼을 클릭하면 2가 나오게 하세요.
        document.getElementById("two").onclick = function(){
            alert(2);
        };

        // Q. 아이디가 three인 버튼을 클릭하면 3이 나오게 하세요.
        document.getElementById("three").onclick = function(){
            alert(3);
        };

        // Q. 아이디가 four인 버튼을 클릭하면 4가 나오게 하세요.
        document.getElementById("four").onclick = function(){
            alert(4);
        };

        // Q. 아이디가 five인 버튼을 클릭하면 5가 나오게 하세요.
        document.getElementById("five").onclick = function(){
            alert(5);
        };

    </script>

</body>
</html>
